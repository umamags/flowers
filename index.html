<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowers, Trees & Leaves of the World</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f0eb;
    }

    nav {
      display: flex;
      background: #1a1a1a;
      padding: 0 1.5rem;
    }

    .tab {
      padding: 1rem 1.75rem;
      font-size: 1rem;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      user-select: none;
    }

    .tab:hover {
      color: rgba(255,255,255,0.85);
    }

    .tab.active {
      color: #fff;
      border-bottom-color: #fff;
    }

    iframe {
      display: none;
      width: 100%;
      height: calc(100vh - 52px);
      border: none;
    }

    iframe.active {
      display: block;
    }
  </style>
</head>
<body>

<nav>
  <div class="tab active" data-target="flowers-frame">Flowers</div>
  <div class="tab" data-target="trees-frame">Trees</div>
  <div class="tab" data-target="leaves-frame">Leaves</div>
</nav>

<iframe id="flowers-frame" class="active" src="flowers/flowers.html" title="Flowers of the World"></iframe>
<iframe id="trees-frame" src="trees/trees.html" title="Trees of the World"></iframe>
<iframe id="leaves-frame" src="leaves/leaves.html" title="Leaves of the World"></iframe>

<script>
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.target).classList.add('active');
    });
  });
</script>

</body>
</html>
